name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-web-vercel:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
      - uses: actions/setup-node@v5
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        with:
          node-version: 24
          cache: npm
      - run: npm ci
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
      - run: npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
      - run: npx vercel build --prod --token "$VERCEL_TOKEN"
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
      - run: npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
      - run: echo "Skipping Vercel deploy because Vercel secrets are not configured."
        if: ${{ env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == '' }}

  deploy-api-aws:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}
      AWS_APP_RUNNER_SERVICE_ARN: ${{ secrets.AWS_APP_RUNNER_SERVICE_ARN }}
    steps:
      - uses: actions/checkout@v5
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.AWS_ECR_REPOSITORY != '' && env.AWS_APP_RUNNER_SERVICE_ARN != '' }}
      - uses: aws-actions/configure-aws-credentials@v5
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.AWS_ECR_REPOSITORY != '' && env.AWS_APP_RUNNER_SERVICE_ARN != '' }}
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.AWS_ECR_REPOSITORY != '' && env.AWS_APP_RUNNER_SERVICE_ARN != '' }}
      - name: Build and push API image
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.AWS_ECR_REPOSITORY != '' && env.AWS_APP_RUNNER_SERVICE_ARN != '' }}
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE="$ECR_REGISTRY/$AWS_ECR_REPOSITORY:latest"
          SHA_IMAGE="$ECR_REGISTRY/$AWS_ECR_REPOSITORY:$GITHUB_SHA"
          docker build -f services/api/Dockerfile -t "$IMAGE" -t "$SHA_IMAGE" .
          docker push "$IMAGE"
          docker push "$SHA_IMAGE"
      - name: Start App Runner deployment
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.AWS_ECR_REPOSITORY != '' && env.AWS_APP_RUNNER_SERVICE_ARN != '' }}
        run: aws apprunner start-deployment --service-arn "$AWS_APP_RUNNER_SERVICE_ARN"
      - run: echo "Skipping AWS API deploy because AWS secrets are not configured."
        if: ${{ env.AWS_ACCESS_KEY_ID == '' || env.AWS_SECRET_ACCESS_KEY == '' || env.AWS_REGION == '' || env.AWS_ECR_REPOSITORY == '' || env.AWS_APP_RUNNER_SERVICE_ARN == '' }}

  deploy-database-rds:
    runs-on: ubuntu-latest
    env:
      AWS_DATABASE_URL: ${{ secrets.AWS_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v5
        if: ${{ env.AWS_DATABASE_URL != '' }}
      - uses: actions/setup-python@v6
        if: ${{ env.AWS_DATABASE_URL != '' }}
        with:
          python-version: "3.13"
      - run: python -m pip install "psycopg[binary]==3.2.13"
        if: ${{ env.AWS_DATABASE_URL != '' }}
      - run: DATABASE_URL="$AWS_DATABASE_URL" python database/scripts/apply_sql.py database/migrations/0001_initial_schema.sql
        if: ${{ env.AWS_DATABASE_URL != '' }}
      - run: echo "Skipping RDS migrations because AWS_DATABASE_URL is not configured."
        if: ${{ env.AWS_DATABASE_URL == '' }}

  eas-build-submit:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_SUBMIT_ON_DEPLOY: ${{ secrets.EAS_SUBMIT_ON_DEPLOY }}
    steps:
      - uses: actions/checkout@v5
        if: ${{ env.EXPO_TOKEN != '' }}
      - uses: actions/setup-node@v5
        if: ${{ env.EXPO_TOKEN != '' }}
        with:
          node-version: 24
          cache: npm
      - uses: expo/expo-github-action@v8
        if: ${{ env.EXPO_TOKEN != '' }}
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}
      - run: npm ci
        if: ${{ env.EXPO_TOKEN != '' }}
      - run: cd apps/mobile && eas build --platform all --profile production --non-interactive --no-wait
        if: ${{ env.EXPO_TOKEN != '' }}
      - run: cd apps/mobile && eas submit --platform all --profile production --non-interactive
        if: ${{ env.EXPO_TOKEN != '' && env.EAS_SUBMIT_ON_DEPLOY == 'true' }}
      - run: echo "Skipping EAS deploy because EXPO_TOKEN is not configured."
        if: ${{ env.EXPO_TOKEN == '' }}
